<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club da Bola - Catálogo Oficial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #25d366; --text: #1a1a1a; --white: #ffffff; --gray: #f4f4f4; --danger: #ff4444; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background-color: var(--white); color: var(--text); padding-bottom: 120px; }
        
        /* Barra de Frete */
        .shipping-bar { background: var(--gray); padding: 12px; position: sticky; top: 0; z-index: 900; border-bottom: 1px solid #ddd; }
        .progress-container { max-width: 600px; margin: 0 auto; text-align: center; }
        .progress-text { font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; display: block; }
        .progress-bg { background: #ddd; height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-fill { background: var(--primary); height: 100%; width: 0%; transition: 0.5s; }

        header { padding: 20px; text-align: center; background: var(--white); }
        .logo-img { max-width: 180px; height: auto; margin-bottom: 5px; }
        .header-subtitle { font-size: 0.8rem; color: #444; font-weight: 700; display: block; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        
        .search-container { max-width: 600px; margin: 0 auto; padding: 0 15px; display: flex; flex-direction: column; gap: 10px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; background: var(--gray); box-sizing: border-box; font-size: 0.9rem; }
        .filter-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }

        .section-container { padding: 20px 15px; max-width: 1200px; margin: 0 auto; }
        .section-title { font-weight: 800; text-transform: uppercase; font-size: 1.1rem; border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; justify-items: center; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 25px; } }

        .card { background: var(--white); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #eee; transition: 0.3s; width: 100%; position: relative; }
        .img-container { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #fdfdfd; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .card .img-hover { position: absolute; top: 0; left: 0; opacity: 0; }
        .card:hover .img-main { opacity: 0; }
        .card:hover .img-hover { opacity: 1; }

        /* Drawer */
        #drawer { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: var(--white); z-index: 1000; transition: 0.4s; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        #drawer.active { right: 0; }
        @media (min-width: 768px) { #drawer { width: 450px; } }
        
        .swiper { width: 100%; height: 320px; border-radius: 12px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: contain; background: #f9f9f9; }

        .qty-selector { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; background: var(--gray); padding: 10px; border-radius: 12px; }
        .qty-btn { background: white; border: 1px solid #ddd; width: 35px; height: 35px; border-radius: 50%; font-weight: 800; cursor: pointer; }
        
        .size-btn { padding: 12px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .size-btn.selected { background: var(--text); color: white; border-color: var(--text); }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .main-btn { width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; border: none; transition: 0.2s; font-family: 'Montserrat'; }
        .btn-add { background: #e8f5e9; color: #2e7d32; border: 1px dashed #2e7d32; }
        .btn-whatsapp { background: var(--primary); color: white; }
        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .cart-summary { position: fixed; bottom: 0; left: 0; right: 0; background: var(--text); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 950; transform: translateY(100%); transition: 0.4s; }
        .cart-summary.active { transform: translateY(0); }
        .btn-clear { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; font-weight: 700; margin-top: 5px; }
    </style>
</head>
<body>

<div class="shipping-bar">
    <div class="progress-container">
        <span class="progress-text" id="shippingText">🔥 Adicione 5 camisas para ganhar FRETE GRÁTIS!</span>
        <div class="progress-bg"><div class="progress-fill" id="progressBar"></div></div>
    </div>
</div>

<header>
    <img src="https://raw.githubusercontent.com/brenerlabs/catalogovenda/main/logo1.png" alt="Club da Bola" class="logo-img">
    <span class="header-subtitle">Qualidade Tailandesa 1:1</span>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Qual time você procura?" oninput="applyFilters()">
        <div class="filter-group">
            <select id="catFilter" onchange="applyFilters()"><option value="">Todas Categorias</option></select>
            <select id="modFilter" onchange="applyFilters()"><option value="">Todos Modelos</option></select>
        </div>
    </div>
</header>

<main id="catalog"></main>

<div id="drawer">
    <div style="padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
        <button onclick="closeDrawer()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
        <span style="font-weight:800;">DETALHES DO PRODUTO</span>
        <div style="width:24px;"></div>
    </div>
    
    <div style="flex: 1; overflow-y: auto; padding: 20px;">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="swiperWrapper"></div>
            <div class="swiper-pagination"></div>
        </div>

        <h2 id="pTitle" style="margin: 20px 0 5px 0; font-size: 1.1rem; line-height: 1.4;"></h2>
        <span id="pPrice" style="font-size:1.6rem; color:var(--primary); font-weight:800;"></span>

        <p style="font-weight:700; font-size:0.8rem; margin: 20px 0 10px;">SELECIONE O TAMANHO:</p>
        <div id="sizeGrid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px;">
            <button class="size-btn" onclick="selectSize(this)">P</button>
            <button class="size-btn" onclick="selectSize(this)">M</button>
            <button class="size-btn" onclick="selectSize(this)">G</button>
            <button class="size-btn" onclick="selectSize(this)">GG</button>
            <button class="size-btn" onclick="selectSize(this)">XG</button>
        </div>

        <p style="font-weight:700; font-size:0.8rem; margin: 20px 0 10px;">QUANTIDADE:</p>
        <div class="qty-selector">
            <button class="qty-btn" onclick="updateQty(-1)">-</button>
            <span id="qtyVal" style="font-weight:800; font-size:1.2rem;">1</span>
            <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>

        <div class="btn-group">
            <button id="addBtn" class="main-btn btn-add" disabled onclick="addToCart()">ADICIONAR AO CARRINHO</button>
            <button id="buyBtn" class="main-btn btn-whatsapp" disabled onclick="directBuy()">COMPRAR AGORA</button>
        </div>
    </div>
</div>

<div class="cart-summary" id="cartSummary">
    <div>
        <span id="cartCount" style="font-weight:800; display:block; font-size: 1.1rem;">0 ITENS</span>
        <button class="btn-clear" onclick="clearCart()">LIMPAR CARRINHO</button>
    </div>
    <button class="main-btn btn-whatsapp" style="width:auto; padding: 12px 20px;" onclick="checkout()">FECHAR PEDIDO</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const BASE_URL = "https://raw.githubusercontent.com/brenerlabs/catalogovenda/main/";
    const WHATSAPP_NUMBER = "5591993249580";

    const nomesReais = {
        "masculina": "Masculina", "feminina": "Feminina", "infantil": "Infantil",
        "brasileirao": "Brasileirão", "selecoes": "Seleções", "la-liga": "La Liga",
        "sao-paulo": "São Paulo", "vasco": "Vasco", "flamengo": "Flamengo", 
        "corinthians": "Corinthians", "palmeiras": "Palmeiras", "cruzeiro": "Cruzeiro", "brasil": "Brasil",
        "casa-torcedor": "Casa - Torcedor", "fora-torcedor": "Fora - Torcedor",
        "casa-jogador": "Casa - Jogador", "fora-jogador": "Fora - Jogador",
        "casa": "Casa", "fora": "Fora"
    };

    let db = [
        { id: 1, genero: "masculina", cat: "brasileirao", time: "vasco", ano: "2026", modelo: "casa-torcedor", fotos: 2, preco: 169.00 },
        { id: 2, genero: "masculina", cat: "brasileirao", time: "corinthians", ano: "2026", modelo: "casa-torcedor", fotos: 2, preco: 169.00 },
        { id: 3, genero: "masculina", cat: "brasileirao", time: "flamengo", ano: "2026", modelo: "casa-torcedor", fotos: 2, preco: 169.00 },
        { id: 4, genero: "masculina", cat: "brasileirao", time: "palmeiras", ano: "2026", modelo: "casa-torcedor", fotos: 2, preco: 169.00 },
        { id: 5, genero: "masculina", cat: "brasileirao", time: "cruzeiro", ano: "2026", modelo: "casa-torcedor", fotos: 2, preco: 169.00 },
        { id: 6, genero: "masculina", cat: "brasileirao", time: "sao-paulo", ano: "2026", modelo: "casa-torcedor", fotos: 2, preco: 169.00 },
        { id: 7, genero: "masculina", cat: "selecoes", time: "brasil", ano: "2026", modelo: "casa-torcedor", fotos: 2, preco: 189.00 },
        { id: 8, genero: "masculina", cat: "selecoes", time: "argentina", ano: "2026", modelo: "casa-torcedor", fotos: 2, preco: 189.00 }
    ];

    let cart = [];
    let selectedProduct = null;
    let currentQty = 1;
    let swiper = null;

    const traduzir = (t) => nomesReais[t] || t;

    function getImagePath(p, num) {
        return `${BASE_URL}${p.genero}/${p.cat}/${p.time}/${p.ano}/${p.modelo}/foto${num}.png`;
    }

    function renderCatalog(products) {
        const container = document.getElementById('catalog');
        container.innerHTML = '';
        const cats = [...new Set(products.map(p => p.cat))];
        
        cats.forEach(cat => {
            const section = document.createElement('section');
            section.className = 'section-container';
            section.innerHTML = `<div class="section-title">${traduzir(cat)}</div><div class="grid" id="grid-${cat}"></div>`;
            container.appendChild(section);
            
            products.filter(p => p.cat === cat).forEach(p => {
                const titulo = `Camisa ${traduzir(p.genero)} ${traduzir(p.time)} ${p.ano}`;
                document.getElementById(`grid-${cat}`).innerHTML += `
                    <div class="card" onclick="openDrawer(${p.id})">
                        <div class="img-container">
                            <img src="${getImagePath(p, 1)}" class="img-main">
                            <img src="${getImagePath(p, 2)}" class="img-hover" onerror="this.style.opacity=0">
                        </div>
                        <div style="padding:15px; text-align:center;">
                            <span style="font-weight:700; font-size:0.8rem;">${titulo}</span><br>
                            <span style="color:var(--primary); font-weight:800;">R$ ${p.preco.toFixed(2).replace('.',',')}</span>
                        </div>
                    </div>`;
            });
        });
    }

    function openDrawer(id) {
        selectedProduct = db.find(x => x.id === id);
        currentQty = 1;
        document.getElementById('qtyVal').innerText = "1";
        document.getElementById('pTitle').innerText = `Camisa ${traduzir(selectedProduct.genero)} ${traduzir(selectedProduct.time)} ${selectedProduct.ano} - ${traduzir(selectedProduct.modelo)}`;
        document.getElementById('pPrice').innerText = `R$ ${selectedProduct.preco.toFixed(2).replace('.',',')}`;
        
        const wrap = document.getElementById('swiperWrapper');
        wrap.innerHTML = '';
        for(let i=1; i<=selectedProduct.fotos; i++) {
            wrap.innerHTML += `<div class="swiper-slide"><img src="${getImagePath(selectedProduct, i)}"></div>`;
        }
        
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('addBtn').disabled = true;
        document.getElementById('buyBtn').disabled = true;
        document.getElementById('drawer').classList.add('active');

        if(swiper) swiper.destroy();
        swiper = new Swiper(".mySwiper", { pagination: { el: ".swiper-pagination", clickable: true } });
    }

    function selectSize(btn) {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('addBtn').disabled = false;
        document.getElementById('buyBtn').disabled = false;
    }

    function updateQty(val) {
        currentQty = Math.max(1, currentQty + val);
        document.getElementById('qtyVal').innerText = currentQty;
    }

    function addToCart() {
        const size = document.querySelector('.size-btn.selected').innerText;
        cart.push({ ...selectedProduct, size, qty: currentQty });
        updateCartUI();
        closeDrawer();
    }

    function directBuy() {
        const size = document.querySelector('.size-btn.selected').innerText;
        const msg = `Olá! Quero comprar agora:\n⚽ *${traduzir(selectedProduct.time)} ${selectedProduct.ano}*\n📏 Tamanho: ${size}\n🔢 Qtd: ${currentQty}`;
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`);
    }

    function updateCartUI() {
        const total = cart.reduce((acc, item) => acc + item.qty, 0);
        document.getElementById('cartCount').innerText = `${total} ${total > 1 ? 'ITENS' : 'ITEM'}`;
        document.getElementById('cartSummary').classList.toggle('active', cart.length > 0);
        
        const progress = Math.min((total / 5) * 100, 100);
        document.getElementById('progressBar').style.width = progress + '%';
        document.getElementById('shippingText').innerText = total >= 5 ? 
            "✅ VOCÊ GANHOU FRETE GRÁTIS!" : `🔥 Adicione mais ${5 - total} para FRETE GRÁTIS!`;
    }

    function clearCart() { cart = []; updateCartUI(); }

    function checkout() {
        let msg = "⚽ *Novo Pedido - Club da Bola*\n\n";
        cart.forEach(item => {
            msg += `• ${traduzir(item.time)} ${item.ano} (${item.size}) x${item.qty}\n`;
        });
        if(cart.reduce((acc, i) => acc + i.qty, 0) >= 5) msg += "\n🚚 *FRETE GRÁTIS ATIVADO*";
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`);
    }

    function closeDrawer() { document.getElementById('drawer').classList.remove('active'); }

    function applyFilters() {
        const text = document.getElementById('searchInput').value.toLowerCase();
        const cat = document.getElementById('catFilter').value;
        const mod = document.getElementById('modFilter').value;
        const filtered = db.filter(p => 
            (traduzir(p.time).toLowerCase().includes(text)) && 
            (cat === "" || p.cat === cat) && 
            (mod === "" || p.modelo === mod)
        );
        renderCatalog(filtered);
    }

    function init() {
        const cats = [...new Set(db.map(p => p.cat))];
        const mods = [...new Set(db.map(p => p.modelo))];
        cats.forEach(c => document.getElementById('catFilter').innerHTML += `<option value="${c}">${traduzir(c)}</option>`);
        mods.forEach(m => document.getElementById('modFilter').innerHTML += `<option value="${m}">${traduzir(m)}</option>`);
        renderCatalog(db);
    }
    init();
</script>
</body>
</html>

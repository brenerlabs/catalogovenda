<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club da Bola - Catálogo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #111; --accent: #25d366; --bg: #fff; --gray: #f4f4f4; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #333; overflow-x: hidden; }
        
        header { padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .logo-area { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }
        .logo-area img { height: 45px; width: auto; }
        .logo-area h1 { font-family: 'Oswald'; font-size: 1.5rem; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .controls { max-width: 600px; margin: 0 auto 20px; padding: 0 15px; display: flex; flex-direction: column; gap: 10px; }
        #searchInput { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .select-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; font-size: 0.9rem; }

        /* CATEGORIAS CENTRALIZADAS */
        .section-title { font-family: 'Oswald'; font-size: 1.2rem; padding: 30px 15px 15px; text-transform: uppercase; text-align: center; border-top: 1px solid #eee; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); max-width: 1200px; margin: 0 auto; } }

        /* EFEITO DE CARREGAMENTO (SKELETON) */
        .img-container { aspect-ratio: 1/1; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
        @keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .img-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s; }
        .img-container img.loaded { opacity: 1; }

        .card { cursor: pointer; }
        .p-name { font-size: 0.85rem; font-weight: 600; margin-bottom: 2px; }
        .p-mod { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .p-price { font-size: 1rem; font-weight: 700; margin-top: 5px; }

        /* DRAWER E GALERIA */
        #productDrawer { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: #fff; z-index: 2500; transition: 0.4s ease; display: flex; flex-direction: column; }
        #productDrawer.active { right: 0; }
        @media (min-width: 768px) { #productDrawer { width: 450px; border-left: 1px solid #eee; } }

        .swiper-container { width: 100%; height: 400px; background: var(--gray); }
        .swiper-slide img { width: 100%; height: 100%; object-fit: contain; cursor: zoom-in; }

        .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .size-btn { border: 1px solid #ddd; padding: 12px; text-align: center; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .size-btn.selected { background: #000; color: #fff; }

        #shippingBar { background: #fff; padding: 15px; border-top: 1px solid #eee; position: sticky; bottom: 0; z-index: 100; }
        .bar-container { background: #eee; height: 6px; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .bar-fill { background: var(--accent); width: 0%; height: 100%; transition: 0.4s; }

        #cartFloat { position: fixed; bottom: 80px; right: 20px; background: var(--accent); color: #fff; padding: 15px 25px; border-radius: 30px; display: none; z-index: 1500; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="logo1.png" alt="Club da Bola">
            <h1>Club da Bola</h1>
        </div>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Qual time você procura?" onkeyup="applyFilters()">
            <div class="select-row">
                <select id="catFilter" onchange="applyFilters()"><option value="todos">Categorias</option></select>
                <select id="modelFilter" onchange="applyFilters()">
                    <option value="todos">Modelos</option>
                    <option value="torcedor">Torcedor</option>
                    <option value="jogador">Jogador</option>
                </select>
            </div>
        </div>
    </header>

    <main id="catalog"></main>

    <div id="productDrawer">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
            <button onclick="closeDrawer()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
            <span style="font-weight:700;">DETALHES</span>
            <div style="width:24px;"></div>
        </div>
        
        <div style="flex:1; overflow-y:auto;">
            <div class="swiper swiper-gallery">
                <div class="swiper-wrapper" id="galleryWrapper"></div>
                <div class="swiper-pagination"></div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
            </div>

            <div style="padding:20px;">
                <div id="drawerInfo"></div>
                <div class="size-grid">
                    ${['P','M','G','GG'].map(s => `<div class="size-btn" onclick="selSize(this, '${s}')">${s}</div>`).join('')}
                </div>
            </div>
        </div>

        <div style="padding:20px; border-top:1px solid #eee;">
            <button id="btnFinal" style="width:100%; padding:15px; border-radius:8px; border:none; font-weight:bold; background:#ccc; color:#fff;" disabled>SELECIONE O TAMANHO</button>
        </div>
    </div>

    <div id="shippingBar">
        <div id="shippingText" style="font-size:0.8rem; font-weight:600; text-align:center;">Adicione 5 camisas para Frete Grátis!</div>
        <div class="bar-container"><div class="bar-fill" id="barFill"></div></div>
    </div>

    <a href="#" id="cartFloat" onclick="sendWhatsApp()">🛒 Finalizar Pedido (<span id="cartCount">0</span>)</a>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const USER = 'brenerlabs';
        const REPO = 'catalogovenda';
        let db = [];
        let cart = [];
        let gallerySwiper = null;

        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/`);
                const cats = await res.json();
                
                for (let c of cats) {
                    if (c.type !== 'dir' || c.name.startsWith('.')) continue;
                    const resAnos = await fetch(c.url);
                    const anos = await resAnos.json();
                    
                    for (let a of anos) {
                        const resTimes = await fetch(a.url);
                        const times = await resTimes.json();
                        
                        // Lógica para evitar duplicatas: se encontrar dois do mesmo time, o segundo vira "Jogador"
                        let timeCheck = {};

                        for (let t of times) {
                            const resMods = await fetch(t.url);
                            const mods = await resMods.json();
                            
                            for (let m of mods) {
                                let modeloIdentificado = m.name.toLowerCase().includes('jogador') ? 'jogador' : 'torcedor';
                                
                                // Ajuste automático de duplicidade conforme solicitado
                                if(timeCheck[t.name] === 'torcedor' && modeloIdentificado === 'torcedor') {
                                    modeloIdentificado = 'jogador';
                                }
                                timeCheck[t.name] = modeloIdentificado;

                                // Busca todas as fotos da pasta
                                const resFotos = await fetch(m.url);
                                const fotosFiles = await resFotos.json();
                                const fotosList = fotosFiles.filter(f => f.name.match(/\.(png|jpe?g|webp)$/i)).map(f => f.path);

                                db.push({
                                    id: Math.random().toString(36).substr(2,9),
                                    cat: c.name, ano: a.name, nome: t.name,
                                    mod: modeloIdentificado,
                                    path: m.path, 
                                    fotos: fotosList,
                                    preco: modeloIdentificado === 'jogador' ? 189 : 169
                                });
                            }
                        }
                    }
                }
                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            const catalog = document.getElementById('catalog');
            const uniqueCats = [...new Set(db.map(p => p.cat))];
            
            uniqueCats.forEach(c => {
                catalog.innerHTML += `
                    <div class="section-group" data-cat="${c}">
                        <div class="section-title">${c}</div>
                        <div class="product-grid" id="grid-${c.replace(/\s/g,'')}"></div>
                    </div>`;
                
                const grid = document.getElementById(`grid-${c.replace(/\s/g,'')}`);
                db.filter(p => p.cat === c).forEach(p => {
                    grid.innerHTML += `
                        <div class="card" onclick="openDrawer('${p.id}')" data-nome="${p.nome.toLowerCase()}" data-mod="${p.mod}">
                            <div class="img-container">
                                <img src="https://raw.githubusercontent.com/${USER}/${REPO}/main/${p.fotos[0]}" onload="this.classList.add('loaded')">
                            </div>
                            <div class="p-name">Camisa ${p.nome}</div>
                            <div class="p-mod">Modelo ${p.mod} - ${p.ano}</div>
                            <div class="p-price">R$ ${p.preco},00</div>
                        </div>`;
                });
            });
        }

        function openDrawer(id) {
            const p = db.find(x => x.id === id);
            const wrapper = document.getElementById('galleryWrapper');
            wrapper.innerHTML = p.fotos.map(f => `
                <div class="swiper-slide">
                    <img src="https://raw.githubusercontent.com/${USER}/${REPO}/main/${f}" onclick="window.open(this.src)">
                </div>`).join('');

            document.getElementById('drawerInfo').innerHTML = `
                <h2 style="font-family:'Oswald'; margin:0;">${p.nome.toUpperCase()} - ${p.ano}</h2>
                <div style="color:#888; font-size:0.85rem; margin-bottom:10px;">Modelo ${p.mod}</div>
                <div style="font-size:1.4rem; font-weight:bold; color:var(--primary);">R$ ${p.preco},00</div>
            `;

            if(gallerySwiper) gallerySwiper.destroy();
            gallerySwiper = new Swiper('.swiper-gallery', {
                pagination: { el: '.swiper-pagination' },
                navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
            });

            document.getElementById('productDrawer').classList.add('active');
        }

        function selSize(el, s) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            const btn = document.getElementById('btnFinal');
            btn.disabled = false;
            btn.style.background = "#000";
            btn.innerText = `ADICIONAR (${s})`;
            btn.onclick = () => {
                cart.push({nome: document.querySelector('#drawerInfo h2').innerText, tamanho: s});
                updateShipping();
                closeDrawer();
            };
        }

        function updateShipping() {
            const count = cart.length;
            document.getElementById('cartFloat').style.display = count > 0 ? 'block' : 'none';
            document.getElementById('cartCount').innerText = count;
            const perc = Math.min((count / 5) * 100, 100);
            document.getElementById('barFill').style.width = perc + '%';
        }

        function applyFilters() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const m = document.getElementById('modelFilter').value;
            document.querySelectorAll('.card').forEach(c => {
                const match = c.dataset.nome.includes(s) && (m === 'todos' || c.dataset.mod === m);
                c.style.display = match ? 'block' : 'none';
            });
        }

        function closeDrawer() { document.getElementById('productDrawer').classList.remove('active'); }
        init();
    </script>
</body>
</html>
